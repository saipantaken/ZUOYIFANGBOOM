<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播间心跳炸弹 0-500 (终极雷达版)</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; text-align: center; background-color: #2c3e50; color: white; margin-top: 50px; }
        .container { background-color: #34495e; max-width: 500px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        h1 { color: #f1c40f; }
        .range { font-size: 40px; font-weight: bold; color: #2ecc71; margin: 20px 0; }
        input { font-size: 24px; padding: 10px; width: 150px; text-align: center; border-radius: 5px; border: none; }
        button { font-size: 24px; padding: 10px 20px; background-color: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #c0392b; }
        button:disabled { background-color: #7f8c8d; cursor: not-allowed; }
        .message { margin-top: 20px; font-size: 28px; font-weight: bold; min-height: 40px; }
        .history { margin-top: 20px; text-align: left; background: #2c3e50; padding: 10px; border-radius: 5px; height: 150px; overflow-y: auto; color: #bdc3c7;}
        .restart-btn { background-color: #3498db; margin-top: 20px; font-size: 16px; }
        
        /* 倒数时的心跳动画效果 */
        .countdown { color: #e67e22; font-size: 36px; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

<div class="container">
    <h1>💣 终极心跳炸弹 💣</h1>
    <div class="range">当前范围：<span id="minVal">0</span> ~ <span id="maxVal">500</span></div>
    
    <input type="number" id="guessInput" placeholder="输入数字" min="0" max="500">
    <button id="guessBtn" onclick="makeGuess()">猜！</button>
    
    <div class="message" id="msg">游戏开始！谁能踩中大奖？</div>
    <button class="restart-btn" onclick="initGame()">重新开始新一局</button>

    <div class="history" id="historyLog">
        <div>-- 历史记录 --</div>
    </div>
</div>

<audio id="sound321" src="321.mp3"></audio>
<audio id="soundWarning" src="warning.mp3"></audio>
<audio id="soundHostBomb" src="hostbomb.mp3"></audio>
<audio id="soundPlayerBomb" src="playerbomb.mp3"></audio>
<audio id="soundWin" src="win.mp3"></audio>
<audio id="soundRandom" src=""></audio> 

<script>
    let min = 0, max = 500;
    let grandPrize = 0;
    let hostBombs = [], playerBombs = [];
    let isGameOver = false;
    let safeClickCount = 0; 

    function playSound(elementId) {
        let audio = document.getElementById(elementId);
        if (audio) {
            audio.currentTime = 0; 
            audio.play().catch(e => console.log("等待音频加载或未找到文件..."));
        }
    }

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function initGame() {
        min = 0; max = 500;
        hostBombs = []; playerBombs = [];
        isGameOver = false;
        safeClickCount = 0;

        for (let i = 0; i < 10; i++) {
            let start = i * 50;
            let end = (i === 9) ? 500 : (i * 50 + 49); 
            
            let hostBomb = getRandomInt(start, end);
            let playerBomb = getRandomInt(start, end);
            while (playerBomb === hostBomb) { playerBomb = getRandomInt(start, end); } 
            
            hostBombs.push(hostBomb);
            playerBombs.push(playerBomb);
        }

        do { grandPrize = getRandomInt(0, 500); } 
        while (hostBombs.includes(grandPrize) || playerBombs.includes(grandPrize));

        updateUI();
        document.getElementById("msg").className = "message";
        document.getElementById("msg").innerText = "游戏已重置，开始你的表演！";
        document.getElementById("msg").style.color = "white";
        document.getElementById("historyLog").innerHTML = "<div>-- 历史记录 --</div>";
        document.getElementById("guessInput").value = "";
        
        document.getElementById("guessBtn").disabled = false;
        document.getElementById("guessInput").disabled = false;
    }

    function updateUI() {
        document.getElementById("minVal").innerText = min;
        document.getElementById("maxVal").innerText = max;
    }

    function logHistory(text) {
        let logDiv = document.getElementById("historyLog");
        logDiv.innerHTML += `<div>${text}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function makeGuess() {
        if (isGameOver) return;
        
        let inputEl = document.getElementById("guessInput");
        let guessBtn = document.getElementById("guessBtn");
        let input = inputEl.value;
        let guess = parseInt(input);
        let msgEl = document.getElementById("msg");

        if (isNaN(guess) || guess <= min || guess >= max) {
            msgEl.innerText = "请输入范围内的有效数字！";
            return;
        }

        guessBtn.disabled = true;
        inputEl.disabled = true;
        
        playSound("sound321");
        
        msgEl.className = "message countdown"; 
        msgEl.innerText = "准备... 3";
        await sleep(1000); 
        
        msgEl.innerText = "准备... 2";
        await sleep(1000);
        
        msgEl.innerText = "准备... 1";
        await sleep(1000);
        
        msgEl.className = "message";
        
        if (guess === grandPrize) {
            msgEl.innerText = "🎉 砰！恭喜踩中终极大奖！ 🎉";
            msgEl.style.color = "#f1c40f";
            logHistory(`猜了 ${guess} -> 🎁 赢取大奖！`);
            playSound("soundWin");
            isGameOver = true;
            return; 
        } 
        
        if (hostBombs.includes(guess)) {
            msgEl.innerText = "💥 踩雷了！惩罚主播！ 💥";
            msgEl.style.color = "#e74c3c";
            logHistory(`猜了 ${guess} -> 💣 主播受罚`);
            playSound("soundHostBomb");
            
        } else if (playerBombs.includes(guess)) {
            msgEl.innerText = "💥 踩雷了！惩罚玩家！ 💥";
            msgEl.style.color = "#e74c3c";
            logHistory(`猜了 ${guess} -> 💣 玩家受罚`);
            playSound("soundPlayerBomb");
            
        } else {
            let isWarning = false;
            let allBombs = hostBombs.concat(playerBombs).concat([grandPrize]); 
            
            for(let b of allBombs) {
                if (Math.abs(guess - b) <= 5 && Math.abs(guess - b) > 0) { 
                    isWarning = true;
                    break;
                }
            }

            if (isWarning) {
                msgEl.innerText = "⚠️ 滴滴滴！高能预警！附近有情况！";
                msgEl.style.color = "#e67e22"; 
                logHistory(`猜了 ${guess} -> ⚠️ 雷区警报`);
                playSound("soundWarning"); 
                
            } else {
                msgEl.innerText = "安全！范围缩小。";
                msgEl.style.color = "#2ecc71";
                logHistory(`猜了 ${guess} -> 安全`);
                
                safeClickCount++;
                
                if (safeClickCount % 3 === 0) {
                    let randomNum = Math.floor(Math.random() * 10) + 1;
                    let randomAudioPlayer = document.getElementById("soundRandom");
                    randomAudioPlayer.src = `random${randomNum}.mp3`;
                    randomAudioPlayer.play().catch(e => console.log("未找到随机特效音"));
                }
            }
        }

        if (guess < grandPrize) { min = guess; } 
        else { max = guess; }
        
        updateUI();
        inputEl.value = "";
        
        guessBtn.disabled = false;
        inputEl.disabled = false;
        inputEl.focus(); 
    }

    document.getElementById("guessInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter" && !document.getElementById("guessBtn").disabled) {
            event.preventDefault();
            makeGuess();
        }
    });

    window.onload = initGame;
</script>

</body>
</html>
